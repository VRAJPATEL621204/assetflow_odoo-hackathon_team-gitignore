version: '3.8'

services:
  # ─────────────────────────────────────────
  # 1. PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: assetflow-postgres
    environment:
      POSTGRES_USER: cde
      POSTGRES_PASSWORD: cde_secret
      POSTGRES_DB: company_discovery
    ports:
      - "5433:5432"           # host:5433 avoids conflict with any local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cde -d company_discovery"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 2. Backend (Express + Prisma)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: "postgresql://cde:cde_secret@postgres:5432/company_discovery?schema=public"
      JWT_SECRET: "assetflow_jwt_super_secret_hackathon_key_2024"
      JWT_EXPIRES_IN: "7d"
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 3. Frontend (React + Vite → nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the browser at the backend — uses the host machine's port
        VITE_API_BASE_URL: "http://localhost:5000"
    container_name: assetflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 4. Prisma Studio (optional DB viewer)
  # ─────────────────────────────────────────
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-prisma-studio
    environment:
      DATABASE_URL: "postgresql://cde:cde_secret@postgres:5432/company_discovery?schema=public"
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma studio --port 5555 --browser none
    restart: unless-stopped

volumes:
  postgres_data:
